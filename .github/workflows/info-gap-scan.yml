name: Info Gap Scan

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scanner
        run: npm run scan:infogap

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: info-gap-report
          path: |
            output/info-gap-report.xml
            output/info-gap-report.csv
            output/info-gap-report.json
